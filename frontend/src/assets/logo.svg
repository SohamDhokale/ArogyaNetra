  </defs>
  <!-- Outer Eye Shape -->
  <path d="M50 250C50 250 150 100 250 100C350 100 450 250 450 250C450 250 350 400 250 400C150 400 50 250 50 250Z" stroke="url(#eyeGradient)" stroke-width="20" fill="none" />
  
