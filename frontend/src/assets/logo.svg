  <path d="M220 250C220 250 240 260 250 280C260 260 280 250 280 250" stroke="#2980B9" stroke-width="8" stroke-linecap="round" fill="none" />
  
  <!-- Leaves -->
  <path d="M250 180C250 180 220 150 220 120C220 150 250 160 250 180Z" fill="url(#leafGradient)" />
  <path d="M250 180C250 180 280 150 280 120C280 150 250 160 250 180Z" fill="url(#leafGradient)" />
  
  <!-- Sparkles -->
